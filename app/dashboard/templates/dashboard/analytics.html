<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIM - Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-gray-900">APIM - Analytics</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="/dashboard" class="text-sm text-blue-600 hover:text-blue-800">Back to Overview</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            <!-- Time Range Selector -->
            <div class="mb-6 flex space-x-4">
                <button onclick="loadAnalytics('24h')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Last 24 Hours</button>
                <button onclick="loadAnalytics('7d')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">Last 7 Days</button>
                <button onclick="loadAnalytics('30d')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">Last 30 Days</button>
            </div>

            <!-- Charts Row -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Requests Over Time</h3>
                    <canvas id="requestsChart"></canvas>
                </div>
                <div class="bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Response Time Distribution</h3>
                    <canvas id="latencyChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Top Endpoints</h3>
                    <canvas id="endpointsChart"></canvas>
                </div>
                <div class="bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Error Rate by Consumer</h3>
                    <canvas id="errorsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let requestsChart, latencyChart, endpointsChart, errorsChart;

        async function loadAnalytics(period) {
            try {
                const response = await fetch(`/api/v1/metrics/summary?period=${period}`);
                const data = await response.json();
                updateCharts(data);
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }

        function updateCharts(data) {
            if (requestsChart) requestsChart.destroy();
            if (latencyChart) latencyChart.destroy();
            if (endpointsChart) endpointsChart.destroy();
            if (errorsChart) errorsChart.destroy();

            const ctx1 = document.getElementById('requestsChart').getContext('2d');
            requestsChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: data.requests_over_time?.map(d => new Date(d.timestamp).toLocaleTimeString()) || [],
                    datasets: [{
                        label: 'Requests',
                        data: data.requests_over_time?.map(d => d.count) || [],
                        borderColor: 'rgb(59, 130, 246)',
                        tension: 0.1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctx2 = document.getElementById('latencyChart').getContext('2d');
            latencyChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['P50', 'P75', 'P90', 'P95', 'P99'],
                    datasets: [{
                        label: 'Latency (ms)',
                        data: [data.p50_latency, data.p75_latency, data.p90_latency, data.p95_latency, data.p99_latency],
                        backgroundColor: 'rgba(59, 130, 246, 0.5)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctx3 = document.getElementById('endpointsChart').getContext('2d');
            endpointsChart = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: data.top_endpoints?.map(e => e.slug) || [],
                    datasets: [{
                        data: data.top_endpoints?.map(e => e.count) || [],
                        backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctx4 = document.getElementById('errorsChart').getContext('2d');
            errorsChart = new Chart(ctx4, {
                type: 'bar',
                data: {
                    labels: data.errors_by_consumer?.map(c => c.name) || [],
                    datasets: [{
                        label: 'Errors',
                        data: data.errors_by_consumer?.map(c => c.error_count) || [],
                        backgroundColor: 'rgba(239, 68, 68, 0.5)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        loadAnalytics('24h');
    </script>
</body>
</html>
