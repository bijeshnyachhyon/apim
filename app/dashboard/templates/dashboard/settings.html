<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIM - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-gray-900">APIM - Settings</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="/dashboard" class="text-sm text-blue-600 hover:text-blue-800">Back to Overview</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            <!-- T24 Configuration -->
            <div class="bg-white shadow rounded-lg mb-6">
                <div class="px-4 py-5 sm:p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">T24 Connection Settings</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">T24 Host</label>
                            <input type="text" id="t24Host" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="tcserver.bank.internal">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">T24 Port</label>
                            <input type="number" id="t24Port" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="9089">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                            <input type="text" id="t24Username" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                            <input type="password" id="t24Password" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Connection Mode</label>
                            <select id="t24Mode" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                                <option value="http">HTTP</option>
                                <option value="tcp">TCP Socket</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">HTTP Endpoint</label>
                            <input type="text" id="t24Endpoint" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="/BrowserWeb/servlet/BrowserServlet">
                        </div>
                    </div>
                    <button onclick="saveT24Settings()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
                        Save T24 Settings
                    </button>
                </div>
            </div>

            <!-- Rate Limiting Settings -->
            <div class="bg-white shadow rounded-lg mb-6">
                <div class="px-4 py-5 sm:p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Rate Limiting</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Default Per Minute</label>
                            <input type="number" id="ratePerMinute" class="w-full px-3 py-2 border border-gray-300 rounded-md" value="100">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Default Per Hour</label>
                            <input type="number" id="ratePerHour" class="w-full px-3 py-2 border border-gray-300 rounded-md" value="1000">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Global Per Minute</label>
                            <input type="number" id="globalRate" class="w-full px-3 py-2 border border-gray-300 rounded-md" value="10000">
                        </div>
                    </div>
                    <button onclick="saveRateSettings()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
                        Save Rate Limit Settings
                    </button>
                </div>
            </div>

            <!-- Security Settings -->
            <div class="bg-white shadow rounded-lg mb-6">
                <div class="px-4 py-5 sm:p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Security</h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <label class="text-sm font-medium text-gray-700">CORS Enabled</label>
                                <p class="text-xs text-gray-500">Allow cross-origin requests</p>
                            </div>
                            <input type="checkbox" id="corsEnabled" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        </div>
                        <div class="flex items-center justify-between">
                            <div>
                                <label class="text-sm font-medium text-gray-700">Metrics Enabled</label>
                                <p class="text-xs text-gray-500">Enable Prometheus metrics endpoint</p>
                            </div>
                            <input type="checkbox" id="metricsEnabled" checked class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        </div>
                        <div class="flex items-center justify-between">
                            <div>
                                <label class="text-sm font-medium text-gray-700">Structured Logging</label>
                                <p class="text-xs text-gray-500">Enable JSON structured logging</p>
                            </div>
                            <input type="checkbox" id="structlogEnabled" checked class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Change Password -->
            <div class="bg-white shadow rounded-lg">
                <div class="px-4 py-5 sm:p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Change Admin Password</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                            <input type="password" id="currentPassword" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                            <input type="password" id="newPassword" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                    </div>
                    <button onclick="changePassword()" class="mt-4 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
                        Change Password
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function saveT24Settings() {
            const settings = {
                host: document.getElementById('t24Host').value,
                port: document.getElementById('t24Port').value,
                username: document.getElementById('t24Username').value,
                password: document.getElementById('t24Password').value,
                mode: document.getElementById('t24Mode').value,
                endpoint: document.getElementById('t24Endpoint').value
            };
            alert('T24 settings saved. (Note: In production, store these in .env file)');
        }

        async function saveRateSettings() {
            alert('Rate limit settings saved. (Note: In production, update .env file)');
        }

        async function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            if (!current || !newPass) {
                alert('Please fill in both password fields');
                return;
            }
            try {
                const response = await fetch('/api/v1/admin/change-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({current_password: current, new_password: newPass})
                });
                if (response.ok) {
                    alert('Password changed successfully');
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                }
            } catch (error) {
                alert('Error changing password');
            }
        }
    </script>
</body>
</html>
