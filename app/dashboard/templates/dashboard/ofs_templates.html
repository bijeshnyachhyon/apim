<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIM - OFS Templates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-gray-900">APIM - OFS Templates</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="/dashboard" class="text-sm text-blue-600 hover:text-blue-800">Back to Overview</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            <div class="mb-6">
                <button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
                    + Add OFS Template
                </button>
            </div>

            <div class="bg-white shadow rounded-lg">
                <div class="px-4 py-5 sm:p-6">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="templatesTable" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td colspan="6" class="px-6 py-4 text-center text-sm text-gray-500">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-2xl shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Add OFS Template</h3>
                <form onsubmit="createTemplate(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                        <input type="text" id="templateName" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Type</label>
                        <select id="templateType" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                            <option value="enquiry">Enquiry</option>
                            <option value="transaction">Transaction</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">OFS Template</label>
                        <textarea id="ofsTemplate" rows="4" required class="w-full px-3 py-2 border border-gray-300 rounded-md font-mono text-sm" placeholder="e.g., ENQ.CUSTOMER,{CUSTOMER.ID},..."></textarea>
                        <p class="mt-1 text-xs text-gray-500">Use {VARIABLE_NAME} for template variables</p>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea id="templateDesc" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button type="button" onclick="closeAddModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function loadTemplates() {
            try {
                const response = await fetch('/api/v1/admin/ofs-templates');
                const data = await response.json();
                const tbody = document.getElementById('templatesTable');
                tbody.innerHTML = data.data.map(t => `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${t.id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${t.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${t.template_type === 'enquiry' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">
                                ${t.template_type}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">${t.description}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${t.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${t.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button onclick="testTemplate(${t.id})" class="text-blue-600 hover:text-blue-900 mr-3">Test</button>
                            <button onclick="deleteTemplate(${t.id})" class="text-red-600 hover:text-red-900">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading templates:', error);
            }
        }

        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        async function createTemplate(event) {
            event.preventDefault();
            const data = {
                name: document.getElementById('templateName').value,
                template_type: document.getElementById('templateType').value,
                ofs_template: document.getElementById('ofsTemplate').value,
                description: document.getElementById('templateDesc').value
            };
            try {
                const response = await fetch('/api/v1/admin/ofs-templates', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    closeAddModal();
                    loadTemplates();
                }
            } catch (error) {
                console.error('Error creating template:', error);
            }
        }

        async function testTemplate(id) {
            const params = prompt('Enter test parameters (JSON):', '{"CUSTOMER.ID": "12345"}');
            if (params) {
                try {
                    const response = await fetch(`/api/v1/admin/ofs-templates/${id}/test`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({parameters: JSON.parse(params)})
                    });
                    const result = await response.json();
                    alert('Test Result:\n' + JSON.stringify(result, null, 2));
                } catch (error) {
                    alert('Error testing template');
                }
            }
        }

        async function deleteTemplate(id) {
            if (confirm('Are you sure you want to delete this template?')) {
                try {
                    await fetch(`/api/v1/admin/ofs-templates/${id}`, {method: 'DELETE'});
                    loadTemplates();
                } catch (error) {
                    console.error('Error deleting template:', error);
                }
            }
        }

        loadTemplates();
    </script>
</body>
</html>
