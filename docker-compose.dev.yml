version: '3.8'

services:
  apim-db:
    image: mysql:8.0
    container_name: apim-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: apim_db
      MYSQL_USER: apim_user
      MYSQL_PASSWORD: devpass
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  apim-redis:
    image: redis:7-alpine
    container_name: apim-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispass --appendonly yes
    volumes:
      - redis-data:/data

  apim-app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
    container_name: apim-app-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      MYSQL_HOST: apim-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: apim_db
      MYSQL_USER: apim_user
      MYSQL_PASSWORD: devpass
      REDIS_HOST: apim-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispass
      SECRET_KEY: dev-secret-key-12345678901234567890123456789012
      ENCRYPTION_KEY: dev-fernet-key-123456789012345678901234=
    volumes:
      - ./app:/app/app:cached
      - ./migrations:/app/migrations:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      apim-db:
        condition: service_healthy
      apim-redis:
        condition: service_started
    networks:
      - apim-network

volumes:
  mysql-data:
  redis-data:

networks:
  apim-network:
    driver: bridge
