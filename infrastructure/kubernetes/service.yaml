apiVersion: v1
kind: Service
metadata:
  name: apim-service
  namespace: apim-system
  labels:
    app: apim-app
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: apim-app
