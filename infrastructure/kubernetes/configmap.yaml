apiVersion: v1
kind: ConfigMap
metadata:
  name: apim-config
  namespace: apim-system
data:
  app.env: "production"
  app.host: "0.0.0.0"
  app.port: "8000"
  app.debug: "false"
  app.log.level: "INFO"
  mysql.host: "apim-mysql.apim-system.svc.cluster.local"
  mysql.port: "3306"
  mysql.database: "apim_db"
  redis.host: "apim-redis.apim-system.svc.cluster.local"
  redis.port: "6379"
  redis.db: "0"
  t24.host: "tcserver.bank.internal"
  t24.port: "9089"
  t24.connection.mode: "http"
  t24.http.endpoint: "/BrowserWeb/servlet/BrowserServlet"
  t24.timeout.seconds: "30"
  prometheus.enabled: "true"
  prometheus.port: "9090"
  metrics.enabled: "true"
  default.rate.limit.per.hour: "1000"
  default.rate.limit.per.minute: "100"
  global.rate.limit.per.minute: "10000"
  cors.origins: '["*"]'
  cors.credentials: "true"
  dashboard.enabled: "true"
  dashboard.path: "/dashboard"
