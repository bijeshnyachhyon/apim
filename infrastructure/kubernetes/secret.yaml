apiVersion: v1
kind: Secret
metadata:
  name: apim-secret
  namespace: apim-system
type: Opaque
stringData:
  mysql-user: "apim_user"
  mysql-password: "CHANGE_ME_MYSQL_PASSWORD"
  redis-password: "CHANGE_ME_REDIS_PASSWORD"
  jwt-secret: "CHANGE_ME_JWT_SECRET"
  encryption-key: "CHANGE_ME_ENCRYPTION_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: apim-jwt-keys
  namespace: apim-system
type: Opaque
data:
  jwt_private.pem: |
    # Generate with: openssl genrsa -out jwt_private.pem 2048
    # Base64 encode and paste here
    CHANGE_ME_BASE64_ENCODED_PRIVATE_KEY
  jwt_public.pem: |
    # Generate with: openssl rsa -in jwt_private.pem -pubout -out jwt_public.pem
    # Base64 encode and paste here
    CHANGE_ME_BASE64_ENCODED_PUBLIC_KEY
